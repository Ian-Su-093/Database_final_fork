# Plan B (Best-of-N Clause Repair) Configuration
# Production configuration for formal evaluation

model:
  base_name: /home/henrylin0822/models/qwen
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, v_proj]
  quantization: none           # Use pure CUDA without quantization

eval:
  n_candidates: 3              # Number of repair candidates to generate
  temperature: 0.7             # Temperature for candidate generation
  max_new_tokens: 64           # Maximum tokens per generated SQL
  max_prompt_length: 512       # Maximum input prompt length
  max_prm_length: 256          # Maximum length for PRM scoring

paths:
  output_file: results/plan_b_evaluation.jsonl  # Will be timestamped automatically

# System requirements:
# - GPU: RTX 4090 or similar (24GB+ VRAM recommended)
# - PyTorch: 1.13.1+cu116 (compatible with NVIDIA driver 560.94)
# - Transformers: 4.37.0+ (for Qwen2Tokenizer support)
# - ClausePRM: Trained checkpoint with score_head.pt